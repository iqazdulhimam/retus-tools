<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JakHire — Cari Kerja & Hiring Jakarta</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏙️</text></svg>">
<style>
:root {
  --bg: #06060e;
  --surface: #0d0d1a;
  --card: #14142a;
  --card-hover: #1a1a36;
  --border: #25254a;
  --border-glow: rgba(0, 200, 255, 0.15);
  --accent: #00c8ff;
  --accent2: #7c3aed;
  --accent-gradient: linear-gradient(135deg, #00c8ff, #7c3aed);
  --accent-gradient2: linear-gradient(135deg, #7c3aed, #1d4ed8);
  --text: #eeeef8;
  --text2: #7a7a9e;
  --text3: #4a4a6a;
  --success: #00e676;
  --warning: #ffab00;
  --danger: #ff3355;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 30px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* Nav */
nav {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  background: rgba(6,6,14,0.92);
  backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 100;
}
nav .container {
  max-width: 1000px; margin: 0 auto; padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 1.15rem; font-weight: 800;
  text-decoration: none; color: var(--text);
}
.logo .icon {
  width: 32px; height: 32px;
  background: var(--accent-gradient);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
}
.logo .accent { color: var(--accent); }
.nav-links { display: flex; gap: 16px; align-items: center; }
.nav-links a {
  color: var(--text2); text-decoration: none;
  font-size: .85rem; font-weight: 500;
  transition: color .2s;
  padding: 6px 12px; border-radius: 6px;
}
.nav-links a:hover { color: var(--text); background: var(--card); }
.nav-links a.active { color: var(--accent); }

.container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

/* Hero / Header */
.hero {
  text-align: center;
  padding: 36px 0 20px;
}
.hero h1 {
  font-size: 2rem; font-weight: 900;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p { color: var(--text2); font-size: .92rem; margin-top: 6px; }
.hero .stats {
  display: flex; gap: 24px; justify-content: center;
  margin-top: 14px; font-size: .85rem; color: var(--text2);
}
.hero .stats span { color: var(--accent); font-weight: 700; }

/* Action buttons */
.actions {
  display: flex; gap: 10px; justify-content: center;
  margin: 20px 0;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  font-size: .85rem; font-weight: 600;
  border: none; cursor: pointer;
  transition: all .25s;
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary {
  background: var(--accent-gradient);
  color: #fff;
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0,200,255,0.25);
}
.btn-secondary {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  background: var(--card-hover);
  border-color: var(--accent);
}
.btn-outline {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
}
.btn-outline:hover {
  background: rgba(0,200,255,0.1);
}
.btn-sm { padding: 6px 14px; font-size: .8rem; }
.btn-danger {
  background: rgba(255,51,85,0.12);
  color: var(--danger);
  border: 1px solid rgba(255,51,85,0.2);
}
.btn-danger:hover { background: rgba(255,51,85,0.2); }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 999;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal h2 {
  font-size: 1.2rem;
  margin-bottom: 4px;
}
.modal .sub {
  color: var(--text2);
  font-size: .85rem;
  margin-bottom: 20px;
}
.modal-close {
  float: right;
  background: none;
  border: none;
  color: var(--text2);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}
.modal-close:hover { color: var(--text); }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: .82rem;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 5px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: .9rem;
  outline: none;
  transition: border-color .2s;
  font-family: inherit;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--border-glow);
}
.form-group textarea {
  min-height: 80px;
  resize: vertical;
}
.form-group select option { background: var(--surface); }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }

/* Filters */
.filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 16px;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: .78rem;
  font-weight: 600;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all .2s;
}
.filter-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.filter-btn.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

/* Area sections */
.area-section { margin-bottom: 28px; }
.area-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
  cursor: pointer;
  transition: all .2s;
}
.area-header:hover {
  border-color: var(--accent);
  background: rgba(0,200,255,0.03);
}
.area-header .emoji { font-size: 1.3rem; }
.area-header h3 { font-size: .95rem; font-weight: 700; }
.area-header .count {
  margin-left: auto;
  font-size: .8rem;
  color: var(--text2);
  background: var(--card);
  padding: 2px 10px;
  border-radius: 20px;
}
.area-header .arrow {
  color: var(--text3);
  transition: transform .3s;
  font-size: .8rem;
}
.area-header.collapsed .arrow { transform: rotate(-90deg); }
.area-listings { display: flex; flex-direction: column; gap: 10px; }
.area-header.collapsed + .area-listings { display: none; }

/* Listing card */
.listing {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  transition: all .2s;
}
.listing:hover {
  border-color: rgba(0,200,255,0.25);
  background: var(--card-hover);
  transform: translateX(3px);
}
.listing-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}
.listing-title {
  font-size: .95rem;
  font-weight: 700;
  margin-bottom: 3px;
}
.listing-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: .78rem;
  color: var(--text2);
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.meta-tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: .72rem;
  font-weight: 600;
}
.tag-job { background: rgba(0,230,118,0.1); color: var(--success); }
.tag-hire { background: rgba(124,58,237,0.12); color: var(--accent2); }
.tag-service { background: rgba(0,200,255,0.1); color: var(--accent); }
.tag-collab { background: rgba(255,171,0,0.12); color: var(--warning); }
.tag-other { background: rgba(255,255,255,0.05); color: var(--text2); }

.listing-desc {
  font-size: .85rem;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 8px;
}
.listing-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: .75rem;
  color: var(--text3);
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.04);
}
.listing-footer .contact {
  color: var(--accent);
  text-decoration: none;
}
.listing-footer .contact:hover { text-decoration: underline; }
.expiry-warning { color: var(--warning); }
.expiry-danger { color: var(--danger); font-weight: 600; }
.delete-listing {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: .85rem;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all .2s;
}
.delete-listing:hover { color: var(--danger); background: rgba(255,51,85,0.1); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.empty-state .big { font-size: 3rem; margin-bottom: 10px; }
.empty-state p { font-size: .9rem; }

/* Toast */
.toast-container {
  position: fixed;
  bottom: 20px; right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: .85rem;
  font-weight: 500;
  box-shadow: var(--shadow);
  animation: slideIn .3s ease;
  max-width: 380px;
}
.toast-success { background: var(--success); color: #000; }
.toast-error { background: var(--danger); color: #fff; }
.toast-info { background: var(--accent); color: #000; }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Expiry badge on cards */
.expiry-badge {
  font-size: .7rem;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
}
.expiry-badge.ok { background: rgba(0,230,118,0.1); color: var(--success); }
.expiry-badge.warn { background: rgba(255,171,0,0.12); color: var(--warning); }
.expiry-badge.critical { background: rgba(255,51,85,0.12); color: var(--danger); }

/* Responsive */
@media (max-width: 640px) {
  .hero h1 { font-size: 1.5rem; }
  .form-row { flex-direction: column; gap: 0; }
  .modal { padding: 20px; }
  .listing-header { flex-direction: column; }
  .nav-links { gap: 8px; }
  .nav-links a { font-size: .78rem; padding: 4px 8px; }
  .filters { flex-direction: column; }
}

/* Back to top */
.back-top {
  position: fixed;
  bottom: 20px; left: 20px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 1.1rem;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  transition: all .3s;
  z-index: 50;
}
.back-top:hover { border-color: var(--accent); color: var(--accent); }

/* Category label colors */
.cat-label {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: 0.3px;
}

/* Price / budget */
.listing-budget {
  font-size: .85rem;
  font-weight: 700;
  color: var(--success);
}

/* Area emoji map */
</style>
</head>
<body>

<nav>
  <div class="container">
    <a href="/" class="logo">
      <div class="icon">🏙️</div>
      <span><span class="accent">Jak</span>Hire</span>
    </a>
    <div class="nav-links">
      <a href="index.html">⚡ Tools</a>
      <a href="#" class="active">🏙️ JakHire</a>
    </div>
  </div>
</nav>

<div class="container">

<div class="hero">
  <h1>🏙️ Jakarta Hiring Board</h1>
  <p>Platform cari kerja, hire freelancer, atau tawarin jasa — khusus <strong>Jabodetabek</strong>. Postingan otomatis kehapus <strong>7 hari</strong>.</p>
  <div class="stats">
    <span id="totalListings">0</span> postingan aktif &bull;
    <span id="areaCount">6</span> wilayah
  </div>
</div>

<div class="actions">
  <button class="btn btn-primary" onclick="openModal('post')">➕ Pasang Iklan</button>
  <button class="btn btn-secondary" onclick="document.querySelector('.filters').scrollIntoView({behavior:'smooth'})">🔍 Filter</button>
</div>

<!-- Category quick filter -->
<div class="filters" id="filters">
  <div class="filter-group">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Semua</button>
    <button class="filter-btn" data-filter="cari_kerja" onclick="setFilter('cari_kerja')">💼 Cari Kerja</button>
    <button class="filter-btn" data-filter="cari_freelancer" onclick="setFilter('cari_freelancer')">🔍 Cari Freelancer</button>
    <button class="filter-btn" data-filter="jasa" onclick="setFilter('jasa')">🛠️ Tawarin Jasa</button>
    <button class="filter-btn" data-filter="collab" onclick="setFilter('collab')">🤝 Collab / Partner</button>
  </div>
</div>

<!-- Listings -->
<div id="board"></div>

</div>

<!-- MODAL: Post -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('post')">&times;</button>
    <h2>➕ Pasang Iklan Baru</h2>
    <p class="sub">Postingan akan otomatis dihapus setelah 7 hari. Isi data dengan jujur.</p>

    <form id="postForm" onsubmit="submitPost(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Kategori</label>
          <select id="category" required>
            <option value="cari_kerja">💼 Cari Kerja</option>
            <option value="cari_freelancer">🔍 Cari Freelancer / Karyawan</option>
            <option value="jasa">🛠️ Tawarin Jasa</option>
            <option value="collab">🤝 Cari Partner / Collab</option>
          </select>
        </div>
        <div class="form-group">
          <label>Wilayah Jakarta</label>
          <select id="area" required>
            <option value="Jakarta Pusat">🏛️ Jakarta Pusat</option>
            <option value="Jakarta Selatan">🌳 Jakarta Selatan</option>
            <option value="Jakarta Timur">🌅 Jakarta Timur</option>
            <option value="Jakarta Barat">🌇 Jakarta Barat</option>
            <option value="Jakarta Utara">🌊 Jakarta Utara</option>
            <option value="Kepulauan Seribu">🏝️ Kepulauan Seribu</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Judul Iklan</label>
        <input type="text" id="title" placeholder="Ex: Butuh fotografer untuk event wedding" required maxlength="100">
      </div>

      <div class="form-group">
        <label>Deskripsi</label>
        <textarea id="desc" placeholder="Jelaskan detailnya — gaji/budget, jam kerja, syarat, dll..." required maxlength="1000"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Budget / Gaji (opsional)</label>
          <input type="text" id="budget" placeholder="Ex: Rp 500.000 - 1.000.000">
        </div>
        <div class="form-group">
          <label>Kontak</label>
          <input type="text" id="contact" placeholder="WA / Telegram / Email" required>
        </div>
      </div>

      <div class="form-group">
        <label>Nama Anda (opsional)</label>
        <input type="text" id="poster" placeholder="Boleh nama samaran" maxlength="50">
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px;">🚀 Pasang Iklan</button>
    </form>
  </div>
</div>

<!-- Back to top -->
<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆</button>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ════════════════════════════════════════
// DATA
// ════════════════════════════════════════
const AREAS = [
  "Jakarta Pusat", "Jakarta Selatan", "Jakarta Timur",
  "Jakarta Barat", "Jakarta Utara", "Kepulauan Seribu"
];

const AREA_EMOJI = {
  "Jakarta Pusat": "🏛️",
  "Jakarta Selatan": "🌳",
  "Jakarta Timur": "🌅",
  "Jakarta Barat": "🌇",
  "Jakarta Utara": "🌊",
  "Kepulauan Seribu": "🏝️"
};

const CATEGORY_MAP = {
  cari_kerja: { label: "💼 Cari Kerja", cls: "tag-job" },
  cari_freelancer: { label: "🔍 Cari Freelancer", cls: "tag-hire" },
  jasa: { label: "🛠️ Tawarin Jasa", cls: "tag-service" },
  collab: { label: "🤝 Collab / Partner", cls: "tag-collab" }
};

const STORAGE_KEY = 'jakhire_listings';
const EXPIRY_DAYS = 7;
let currentFilter = 'all';

// ════════════════════════════════════════
// UTILITY
// ════════════════════════════════════════
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function daysAgo(ts) {
  return Math.floor((Date.now() - ts) / (1000*60*60*24));
}

function timeLeft(ts) {
  const passed = Date.now() - ts;
  const total = EXPIRY_DAYS * 24 * 60 * 60 * 1000;
  const remaining = total - passed;
  if (remaining <= 0) return { label: 'Kadaluarsa', cls: 'critical', pct: 100 };
  const daysLeft = Math.ceil(remaining / (1000*60*60*24));
  const hoursLeft = Math.floor((remaining % (1000*60*60*24)) / (1000*60*60));
  const pct = (passed / total) * 100;
  let cls = 'ok';
  if (pct > 80) cls = 'critical';
  else if (pct > 50) cls = 'warn';
  let label = daysLeft > 0 ? `${daysLeft}h` : `${hoursLeft}j`;
  return { label, cls, pct };
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ════════════════════════════════════════
// LOCAL STORAGE
// ════════════════════════════════════════
function getListings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const data = raw ? JSON.parse(raw) : [];
    // Filter expired
    const cutoff = Date.now() - (EXPIRY_DAYS * 24 * 60 * 60 * 1000);
    const valid = data.filter(l => l.createdAt > cutoff);
    if (valid.length !== data.length) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(valid));
    }
    return valid;
  } catch(e) {
    return [];
  }
}

function saveListing(listing) {
  const data = getListings();
  data.unshift(listing);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function deleteListing(id) {
  let data = getListings();
  data = data.filter(l => l.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
  toast('Iklan berhasil dihapus ✅', 'info');
}

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════
function render() {
  const data = getListings();
  const board = document.getElementById('board');

  // Stats
  document.getElementById('totalListings').textContent = data.length;

  if (data.length === 0) {
    board.innerHTML = `
      <div class="empty-state">
        <div class="big">🏙️</div>
        <p>Belum ada postingan nih.</p>
        <p style="font-size:.82rem;margin-top:4px;">Klik <strong>Pasang Iklan</strong> buat mulai!</p>
      </div>
    `;
    return;
  }

  // Filter by category
  const filtered = currentFilter === 'all'
    ? data
    : data.filter(l => l.category === currentFilter);

  // Group by area
  const grouped = {};
  AREAS.forEach(a => { grouped[a] = []; });
  let totalFiltered = 0;
  filtered.forEach(l => {
    if (grouped[l.area]) {
      grouped[l.area].push(l);
      totalFiltered++;
    }
  });

  document.getElementById('totalListings').textContent = totalFiltered;

  let html = '';
  for (const area of AREAS) {
    const items = grouped[area];
    if (items.length === 0 && currentFilter !== 'all') continue; // hide empty areas when filtering
    if (items.length === 0 && currentFilter === 'all') continue; // hide empty areas by default

    html += `<div class="area-section">`;
    html += `<div class="area-header" onclick="this.classList.toggle('collapsed')">`;
    html += `<span class="emoji">${AREA_EMOJI[area]}</span>`;
    html += `<h3>${area}</h3>`;
    html += `<span class="count">${items.length}</span>`;
    html += `<span class="arrow">▼</span>`;
    html += `</div>`;
    html += `<div class="area-listings">`;

    items.sort((a, b) => b.createdAt - a.createdAt);

    for (const item of items) {
      const cat = CATEGORY_MAP[item.category] || CATEGORY_MAP.other;
      const tl = timeLeft(item.createdAt);
      const age = daysAgo(item.createdAt);
      const agelabel = age === 0 ? 'Hari ini' : `${age}h lalu`;
      if (age === 0) agelabel; // weird var name collision

      html += `<div class="listing">`;
      html += `<div class="listing-header">`;
      html += `<div style="flex:1">`;
      html += `<div class="listing-title">${escapeHtml(item.title)}</div>`;
      html += `<div class="listing-meta">`;
      html += `<span class="meta-tag ${cat.cls}">${cat.label}</span>`;
      if (item.budget) html += `<span class="listing-budget">💰 ${escapeHtml(item.budget)}</span>`;
      html += `</div>`;
      html += `</div>`;
      html += `<div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">`;
      html += `<span class="expiry-badge ${tl.cls}">⏳ ${tl.label}</span>`;
      html += `<button class="delete-listing" onclick="deleteListing('${item.id}')" title="Hapus">✕</button>`;
      html += `</div>`;
      html += `</div>`;

      html += `<div class="listing-desc">${escapeHtml(item.desc)}</div>`;

      html += `<div class="listing-footer">`;
      html += `<span>${agelabel} • ${escapeHtml(item.poster || 'Anonim')}</span>`;
      html += `<a class="contact" href="${item.contact.startsWith('http') || item.contact.includes('@') ? '' : 'https://'}${escapeHtml(item.contact)}" target="_blank" rel="noopener">📩 ${escapeHtml(item.contact)}</a>`;
      html += `</div>`;

      html += `</div>`;
    }

    html += `</div></div>`;
  }

  board.innerHTML = html ||
    `<div class="empty-state"><div class="big">🔍</div><p>Tidak ada postingan untuk filter ini.</p></div>`;

  // Show back-to-top
  document.getElementById('backTop').style.display = data.length > 10 ? 'flex' : 'none';
}

// ════════════════════════════════════════
// FILTER
// ════════════════════════════════════════
function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === cat);
  });
  render();
}

// ════════════════════════════════════════
// MODAL
// ════════════════════════════════════════
function openModal(name) {
  document.getElementById(name + 'Modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(name) {
  document.getElementById(name + 'Modal').classList.remove('open');
  document.body.style.overflow = '';
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('open');
      document.body.style.overflow = '';
    }
  });
});

// Escape to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => {
      m.classList.remove('open');
      document.body.style.overflow = '';
    });
  }
});

// ════════════════════════════════════════
// SUBMIT
// ════════════════════════════════════════
function submitPost(e) {
  e.preventDefault();

  const listing = {
    id: uid(),
    category: document.getElementById('category').value,
    area: document.getElementById('area').value,
    title: document.getElementById('title').value.trim(),
    desc: document.getElementById('desc').value.trim(),
    budget: document.getElementById('budget').value.trim(),
    contact: document.getElementById('contact').value.trim(),
    poster: document.getElementById('poster').value.trim() || 'Anonim',
    createdAt: Date.now()
  };

  if (!listing.title || !listing.desc || !listing.contact) {
    toast('Harap isi semua field wajib!', 'error');
    return;
  }

  saveListing(listing);
  document.getElementById('postForm').reset();
  closeModal('post');
  render();
  toast('Iklan berhasil dipasang! 🎉', 'success');
}

// ════════════════════════════════════════
// TOAST
// ════════════════════════════════════════
function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(100%)';
    el.style.transition = 'all .3s';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
render();

// Auto cleanup every minute
setInterval(render, 60000);
</script>
